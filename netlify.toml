[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/news"
  to = "/.netlify/functions/news"
  status = 200

[[redirects]]
  from = "/api/location"
  to = "/.netlify/functions/location"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
